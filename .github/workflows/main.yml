on: [push]
name: Linux_Container_Workflow

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub Action
        uses: actions/checkout@v4

      - name: Login via Azure CLI
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push image
        run: |
          set -euo pipefail
          docker build -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/sampleapp:${{ github.sha }} backend
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/sampleapp:${{ github.sha }}

      - name: Deploy to Azure Container Instances (CLI)
        shell: bash
        run: |
          set -euo pipefail

          RG="${{ secrets.RESOURCE_GROUP }}"
          ACI_NAME="aci-cutr"
          IMAGE="${{ secrets.REGISTRY_LOGIN_SERVER }}/sampleapp:${{ github.sha }}"

          # ACI DNS label rules are strict; sanitize + keep under 63 chars.
          DNS_RAW="${{ secrets.RESOURCE_GROUP }}${{ github.run_number }}"
          DNS_LABEL="$(echo "$DNS_RAW" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9-' | cut -c1-63)"

          # Recreate to ensure image updates apply reliably
          az container delete --resource-group "$RG" --name "$ACI_NAME" --yes || true

          az container create \
            --resource-group "$RG" \
            --name "$ACI_NAME" \
            --image "$IMAGE" \
            --os-type Linux \
            --location "centralus" \
            --dns-name-label "$DNS_LABEL" \
            --registry-login-server "${{ secrets.REGISTRY_LOGIN_SERVER }}" \
            --registry-username "${{ secrets.REGISTRY_USERNAME }}" \
            --registry-password "${{ secrets.REGISTRY_PASSWORD }}" \
            --ports 80
