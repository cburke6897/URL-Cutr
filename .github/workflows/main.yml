on: [push]
name: Linux_Container_Workflow

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${{ secrets.REGISTRY_LOGIN_SERVER }}/sampleapp:${{ github.sha }}"
          docker build -t "$IMAGE" backend
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Azure Container Instances (ACI)
        shell: bash
        run: |
          set -euo pipefail

          RG="${{ secrets.RESOURCE_GROUP }}"
          ACI_NAME="${{ secrets.ACI_NAME || 'aci-cutr' }}"
          LOCATION="${{ secrets.LOCATION || 'centralus' }}"
          IMAGE="${IMAGE}"

          # DNS label rules are strict; sanitize + keep under 63 chars.
          DNS_RAW="${RG}-${{ github.run_number }}"
          DNS_LABEL="$(echo "$DNS_RAW" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9-' | cut -c1-63)"

          # Recreate so image/env updates apply reliably
          az container delete -g "$RG" -n "$ACI_NAME" --yes || true

          az container create \
            -g "$RG" \
            -n "$ACI_NAME" \
            -l "$LOCATION" \
            --image "$IMAGE" \
            --os-type Linux \
            --dns-name-label "$DNS_LABEL" \
            --registry-login-server "${{ secrets.REGISTRY_LOGIN_SERVER }}" \
            --registry-username "${{ secrets.REGISTRY_USERNAME }}" \
            --registry-password "${{ secrets.REGISTRY_PASSWORD }}" \
            --ports 8000 \
            --cpu 1 \
            --memory 1.5 \
            --restart-policy Always \
            --secure-environment-variables \
              DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              REDIS_URL="${{ secrets.REDIS_URL }}" \
              ACCESS_TOKEN_SECRET_KEY="${{ secrets.ACCESS_TOKEN_SECRET_KEY }}" \
              REFRESH_TOKEN_SECRET_KEY="${{ secrets.REFRESH_TOKEN_SECRET_KEY }}" \
              RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
              SUPPORT_EMAIL="${{ secrets.SUPPORT_EMAIL }}" \
              FRONTEND_URL="${{ secrets.FRONTEND_URL }}"

      - name: Show ACI events + crash reason
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          RG="${{ secrets.RESOURCE_GROUP }}"
          ACI_NAME="${{ secrets.ACI_NAME || 'aci-cutr' }}"

          az container show -g "$RG" -n "$ACI_NAME" \
            --query "{state:instanceView.state, events:instanceView.events}" -o yaml || true

          az container show -g "$RG" -n "$ACI_NAME" \
            --query "instanceView.containers[0].instanceView.previousState" -o yaml || true

      - name: Show container logs (stdout/stderr)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          RG="${{ secrets.RESOURCE_GROUP }}"
          ACI_NAME="${{ secrets.ACI_NAME || 'aci-cutr' }}"
          az container logs -g "$RG" -n "$ACI_NAME" || true
